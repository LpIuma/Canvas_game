<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KG8ZVLRZ00"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-KG8ZVLRZ00', {
        'page_title': 'Lpluma游戏站主页', // 这里保持手动设置，因为你网页的 <title> 比较简洁
        'page_path': window.location.pathname // 让系统自动抓取
      });
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* 调整为更明显的淡蓝色天空渐变，以便衬托白云 */
            background: linear-gradient(180deg, #bae6fd 0%, #e0f2fe 40%, #f8fafc 100%);
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- CSS 白云动画 --- */
        .cloud-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: -2; /* 调低一层层级，为粒子点云让出空间 */
            pointer-events: none;
        }
        .cloud {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 100px;
            position: absolute;
            box-shadow: 0 8px 16px rgba(0,0,0,0.02);
            animation: floatClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }
        /* 云朵形状 1 */
        .cloud1 { width: 120px; height: 40px; top: 15%; left: -150px; animation-duration: 45s; }
        .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud1::after { width: 40px; height: 40px; top: -20px; left: 65px; }

        /* 云朵形状 2 */
        .cloud2 { width: 180px; height: 60px; top: 35%; left: -200px; animation-duration: 60s; opacity: 0.7; transform: scale(1.2); }
        .cloud2::before { width: 80px; height: 80px; top: -40px; left: 30px; }
        .cloud2::after { width: 60px; height: 60px; top: -30px; right: 30px; }

        @keyframes floatClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(120vw); }
        }

        /* --- 卡片基础悬浮过渡 --- */
        .vibe-card {
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(255, 255, 255, 0.95); /* 卡片稍微带一点点透明，融入背景 */
            backdrop-filter: blur(10px);
        }
        
        .vibe-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -15px rgba(2, 132, 199, 0.2);
            background: rgba(255, 255, 255, 1);
        }

        /* --- 沙滩球样式 --- */
        #beach-ball {
            position: fixed;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 100;
            user-select: none;
            touch-action: none;
            filter: drop-shadow(0 10px 15px rgba(2, 132, 199, 0.3));
            top: 0; left: 0; /* 初始化位置由JS接管 */
            will-change: transform;
        }
        /* 未弹跳时增加一点悬浮反馈 */
        #beach-ball.resting:hover {
            filter: drop-shadow(0 15px 20px rgba(2, 132, 199, 0.5)) brightness(1.05);
            transform: scale(1.05); 
        }

        /* --- 粒子点云画布 --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 位于白云上方，但在游戏卡片下方 */
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen py-16 px-4 md:px-8 relative">

    <!-- 粒子点云画布 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 背景白云层 -->
    <div class="cloud-container">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2" style="animation-delay: -20s;"></div>
        <div class="cloud cloud1" style="top: 70%; animation-duration: 55s; animation-delay: -10s; transform: scale(0.8); opacity: 0.6;"></div>
    </div>

    <!-- 主体内容区 -->
    <div class="max-w-6xl mx-auto relative z-10">
        <!-- 头部 -->
        <header class="text-center mb-24 mt-8">
            <h1 class="text-5xl md:text-6xl font-black mb-6 text-[#1e3a8a] tracking-tight drop-shadow-sm">
                Lpluma 游戏小站
            </h1>
            <p class="text-sky-700/80 text-lg font-bold tracking-wide">
                Vibe Coding 制作的H5游戏合集
            </p>
        </header>

        <!-- 游戏列表 -->
        <div id="game-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 游戏卡片将通过 JS 动态渲染 -->
        </div>

        <!-- 页脚 -->
        <footer class="mt-32 text-center text-sky-600/60 text-sm font-medium">
            <p>© 2026 Lpluma 游戏小站</p>
        </footer>
    </div>

    <!-- 交互沙滩球 (纯 SVG 绘制) -->
    <div id="beach-ball" class="resting">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
            <defs>
                <clipPath id="ball-clip"><circle cx="50" cy="50" r="48"/></clipPath>
                <!-- 球体高级玻璃质感高光 -->
                <radialGradient id="ball-glow" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
                    <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
                    <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
                </radialGradient>
            </defs>
            <!-- 基础白球底色 -->
            <circle cx="50" cy="50" r="48" fill="#f8fafc" stroke="#7dd3fc" stroke-width="1.5"/>
            
            <!-- 蓝色条纹 -->
            <path d="M50,2 C 20,20 20,80 50,98 C -10,80 -10,20 50,2 Z" fill="#38bdf8" clip-path="url(#ball-clip)"/>
            <path d="M50,2 C 80,20 80,80 50,98 C 110,80 110,20 50,2 Z" fill="#38bdf8" clip-path="url(#ball-clip)"/>
            
            <!-- 顶部白点枢纽 -->
            <circle cx="50" cy="50" r="12" fill="#f8fafc" stroke="#7dd3fc" stroke-width="1.5"/>
            
            <!-- 修改后的字样 -->
            <text x="50" y="54" font-family="Arial, sans-serif" font-size="9" font-weight="900" fill="#0284c7" text-anchor="middle" transform="rotate(-15 50 50)">Lpluma</text>
            
            <!-- 覆盖一层玻璃高光层 -->
            <circle cx="50" cy="50" r="48" fill="url(#ball-glow)" pointer-events="none"/>
        </svg>
    </div>

    <script>
        const GAMES = [
            {
                title: "2048",
                description: "用熊猫图片的诡异程度代替数字大小(创意来自just-joker.top)",
                cover: "https://pic1.imgdb.cn/item/699de40c01b9a5550a560e55.jpg", 
                url: "./games/2048_panda/index.html", 
                tags: ["益智", "猎奇","恐怖"]
            },
            {
                title: "BMPT",
                description: "BMPT 模拟器。",
                cover: "./assets/BMPT.png", 
                url: "./games/BMPT/index.html",
                tags: ["轮椅", "出生","游戏强国"]
            },
            {
                title: "ShitSweeper",
                description: "互联网扫雷，每次点击有概率观看视频，雷则是答辩视频(答辩产自just-joker.top)",
                cover: "./assets/ShitSweeper.png", 
                url: "./games/ShitSweeper/index.html",
                tags: ["奶龙", "搬屎","猎奇"]
            },
            {
                title: "超视距空战模拟器",
                description: "The missile knows where it is the whole time。",
                cover: "./assets/Air_Combat.png", 
                url: "./games/Air_Combat/index.html",
                tags: ["空历", "水滴", "BVR"]
            }
        ];

        function renderGames() {
            const list = document.getElementById('game-list');
            list.innerHTML = GAMES.map(game => `
                <div class="vibe-card group relative rounded-[20px] overflow-hidden cursor-pointer border border-white/60" onclick="window.location.href='${game.url}'">
                    
                    <!-- 顶部情绪线条 -->
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-sky-300 to-[#1e3a8a] opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20"></div>

                    <!-- 封面图 -->
                    <div class="h-56 overflow-hidden bg-sky-50/50 relative m-2 rounded-2xl">
                        <img src="${game.cover}" alt="${game.title}" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                             onerror="this.src='https://via.placeholder.com/400x225/f1f5f9/94a3b8?text=Image'">
                        <div class="absolute inset-0 bg-sky-900/0 group-hover:bg-sky-900/5 transition-colors duration-300"></div>
                    </div>

                    <div class="p-6 pt-5">
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${game.tags.map(tag => `
                                <span class="px-2.5 py-1 bg-sky-100/60 text-sky-700 text-[11px] rounded-md font-bold tracking-wider">${tag}</span>
                            `).join('')}
                        </div>
                        
                        <h2 class="text-2xl font-bold mb-3 text-[#0f172a] group-hover:text-sky-600 transition-colors">${game.title}</h2>
                        <p class="text-slate-500 text-sm leading-relaxed line-clamp-2">${game.description}</p>
                    </div>

                    <div class="px-6 pb-6 mt-2 flex items-center text-sky-500 font-semibold text-sm group-hover:text-[#1e3a8a] transition-colors">
                        开始游戏
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1.5 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                </div>
            `).join('');
        }

        window.onload = renderGames;

        // --- 沙滩球物理引擎 ---
        const ball = document.getElementById('beach-ball');
        const ballSize = 80;
        
        let ballX = window.innerWidth - ballSize - 30; 
        let ballY = window.innerHeight - ballSize - 30;
        let ballVX = 0; 
        let ballVY = 0; 
        let ballRot = 0; 
        let ballAnimating = false;
        
        const gravity = 0.8; 
        const bounce = 0.75; 
        const friction = 0.99; 
        
        function setBallPosition() {
            ball.style.transform = `translate3d(${ballX}px, ${ballY}px, 0) rotate(${ballRot}deg)`;
        }
        setBallPosition();
        
        window.addEventListener('resize', () => {
            if (!ballAnimating) {
                ballX = window.innerWidth - ballSize - 30;
                ballY = window.innerHeight - ballSize - 30;
                setBallPosition();
            }
        });

        ball.addEventListener('click', () => {
            ballVY = -(Math.random() * 15 + 15);
            ballVX = (Math.random() - 0.5) * 45;
            ball.classList.remove('resting');
            if (!ballAnimating) {
                ballAnimating = true;
                requestAnimationFrame(updateBall);
            }
        });

        function updateBall() {
            if (!ballAnimating) return;

            ballVY += gravity;
            ballVX *= friction;
            ballVY *= friction;

            ballX += ballVX;
            ballY += ballVY;
            ballRot += ballVX * 2;

            const maxX = window.innerWidth - ballSize;
            const maxY = window.innerHeight - ballSize;

            if (ballY > maxY) {
                ballY = maxY;
                ballVY = -ballVY * bounce;
                ballVX *= 0.9;
                if (Math.abs(ballVY) < 1.5 && Math.abs(ballVX) < 0.5) {
                    ballAnimating = false;
                    ballVY = 0; ballVX = 0; ballY = maxY;
                    ball.classList.add('resting');
                }
            } else if (ballY < 0) {
                ballY = 0; ballVY = -ballVY * bounce;
            }

            if (ballX > maxX) {
                ballX = maxX; ballVX = -ballVX * bounce;
            } else if (ballX < 0) {
                ballX = 0; ballVX = -ballVX * bounce;
            }

            setBallPosition();
            if (ballAnimating) requestAnimationFrame(updateBall);
        }

        // --- 粒子点云特效引擎 ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        // 根据屏幕大小决定粒子数量，避免手机端卡顿
        const particleCount = window.innerWidth < 768 ? 40 : 80;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6; // 缓慢的水平漂浮
                this.vy = (Math.random() - 0.5) * 0.6 - 0.2; // 整体带有一点向上的微风阻力感
                this.radius = Math.random() * 2 + 0.5; // 粒子大小随机
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // 越界后从屏幕另一侧重新出现（无缝循环）
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; // 半透明纯白粒子
                ctx.fill();
            }
        }

        // 初始化粒子群
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 鼠标位置监听
        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 核心渲染循环
        function animateParticles() {
            // 清空上一帧
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                // 1. 粒子之间的连线 (白色微光)
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 110) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.25 - dist/110 * 0.25})`;
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
                
                // 2. 粒子与鼠标的连线 (交互天蓝色)
                if (mouse.x != null && mouse.y != null) {
                    const dx = particles[i].x - mouse.x;
                    const dy = particles[i].y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 160) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.4 - dist/160 * 0.4})`; // 天蓝色线条
                        ctx.lineWidth = 1.2;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        
        // 启动特效
        animateParticles();
    </script>
</body>
</html>
