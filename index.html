<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .game-card {
            transition: all 0.3s ease;
            background: #1e293b;
            border: 1px solid #334155;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4">

    <div class="max-w-6xl mx-auto">
        <!-- 头部 -->
        <header class="text-center mb-16">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                H5 小游戏
            </h1>
            <p class="text-slate-400 text-lg">Vibe Coding 制作的游戏合集</p>
        </header>

        <!-- 游戏列表 -->
        <div id="game-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 游戏卡片将通过 JS 动态渲染 -->
        </div>

        <!-- 页脚 -->
        <footer class="mt-20 text-center text-slate-500 text-sm border-t border-slate-800 pt-8">
            <p>© 2026 Lpluma 游戏小站 | 基于 GitHub Pages 构建</p>
        </footer>
    </div>

    <script>
        // 更新说明：cover 路径已改为指向本地 assets 文件夹
        // 请确保 assets 文件夹中的文件名与下方代码一致
        const GAMES = [
            {
                title: "猎奇2048",
                description: "熊猫从可爱到诡异的转变(创意来自just-joker.top)",
                cover: "https://pic1.imgdb.cn/item/699de40c01b9a5550a560e55.jpg", // 假设文件名为 2048_cover.jpg
                url: "./games/2048_panda/index.html", 
                tags: ["益智", "猎奇","恐怖", "熊猫人", "Just_Joker"]
            },
            {
                title: "BMPT",
                description: "BMPT 模拟器。",
                cover: "./assets/BMPT.png", // 假设文件名为 bmpt_cover.jpg
                url: "./games/BMPT/index.html",
                tags: ["轮椅", "出生","游戏强国"]
            },
            {
                title: "ShitSweeper",
                description: "每次扫雷均需要观看视频,雷则是答辩视频(答辩产自just-joker.top)",
                cover: "./assets/ShitSweeper.png", // 假设文件名为 shitsweeper_cover.jpg
                url: "./games/ShitSweeper/index.html",
                tags: ["奶龙", "搬屎","猎奇"]
            }
        ];

        function renderGames() {
            const list = document.getElementById('game-list');
            list.innerHTML = GAMES.map(game => `
                <div class="game-card rounded-2xl overflow-hidden flex flex-col cursor-pointer" onclick="window.location.href='${game.url}'">
                    <div class="h-48 overflow-hidden bg-slate-800">
                        <img src="${game.cover}" alt="${game.title}" 
                             class="w-full h-full object-cover" 
                             onerror="this.src='https://via.placeholder.com/400x225/1e293b/475569?text=Image+Not+Found'">
                    </div>
                    <div class="p-6 flex-grow">
                        <div class="flex gap-2 mb-3">
                            ${game.tags.map(tag => `
                                <span class="px-2 py-1 bg-blue-500/10 text-blue-400 text-[10px] rounded-md font-bold uppercase tracking-wider">${tag}</span>
                            `).join('')}
                        </div>
                        <h2 class="text-xl font-bold mb-2">${game.title}</h2>
                        <p class="text-slate-400 text-sm line-clamp-2">${game.description}</p>
                    </div>
                    <div class="p-6 pt-0 mt-auto text-blue-400 font-bold text-sm flex items-center">
                        立即开始 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                </div>
            `).join('');
        }

        window.onload = renderGames;
    </script>
</body>
</html>
