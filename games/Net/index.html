<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Net 网络解谜游戏</title>
  <!-- 通过 CDN 引入 Tailwind CSS 进行快速样式布局 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 为方块旋转添加平滑的过渡动画 */
    .tile-svg {
      transition: transform 0.15s ease-in-out;
    }
    /* 胜利提示画面的淡入动画 */
    .animate-fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; backdrop-filter: blur(0px); }
      to { opacity: 1; backdrop-filter: blur(4px); }
    }
  </style>
</head>
<body class="min-h-screen bg-gray-100 flex flex-col items-center py-6 px-4 font-sans select-none">
  
  <!-- 顶部 UI (User Interface，用户界面) 控制栏 -->
  <div class="w-full max-w-2xl flex justify-between items-center mb-4 bg-white p-4 rounded shadow">
    <h1 class="text-xl font-bold text-gray-800">Net 网络谜题</h1>
    <div class="flex gap-4 items-center">
      <select id="size-select" class="border p-2 rounded bg-gray-50 outline-none cursor-pointer">
        <option value="7">简单 (7x7)</option>
        <option value="11" selected>中等 (11x11)</option>
        <option value="15">困难 (15x15)</option>
      </select>
      <button id="new-game-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition active:scale-95">
        新游戏
      </button>
    </div>
  </div>

  <!-- 游戏棋盘区域 -->
  <div class="relative w-full max-w-2xl aspect-square shadow-lg border-[3px] border-red-600 bg-black p-[1px]">
    <!-- 棋盘容器 -->
    <div id="game-board" class="w-full h-full grid gap-[1px] bg-black"></div>

    <!-- 胜利提示遮罩 (默认隐藏) -->
    <div id="win-overlay" class="hidden absolute inset-0 bg-white/80 flex flex-col items-center justify-center z-10 animate-fade-in">
      <h2 class="text-4xl font-black text-green-600 mb-4 drop-shadow-md">网络已连通！</h2>
      <button id="play-again-btn" class="bg-green-600 text-white px-8 py-3 rounded-full text-xl font-bold hover:bg-green-700 transition shadow-lg active:scale-95">
        再玩一局
      </button>
    </div>
  </div>

  <!-- 底部状态栏 -->
  <div class="w-full max-w-2xl mt-4 bg-white p-3 rounded shadow flex justify-between text-gray-700 font-mono text-lg">
    <span>Active: <span id="active-count">0</span>/<span id="total-count">0</span></span>
    <span id="win-text" class="hidden text-green-600 font-bold">已完成</span>
  </div>

  <!-- 游戏核心逻辑脚本 -->
  <script>
    // 游戏全局状态变量
    let currentSize = 11;
    let gridData = [];
    let totalTerminals = 0;
    let isWon = false;

    // 获取 DOM 元素
    const boardEl = document.getElementById('game-board');
    const sizeSelect = document.getElementById('size-select');
    const newGameBtn = document.getElementById('new-game-btn');
    const playAgainBtn = document.getElementById('play-again-btn');
    const activeCountEl = document.getElementById('active-count');
    const totalCountEl = document.getElementById('total-count');
    const winOverlay = document.getElementById('win-overlay');
    const winText = document.getElementById('win-text');

    // 生成游戏棋盘的核心算法
    function generateBoard(width, height) {
      const grid = Array.from({ length: height }, (_, y) =>
        Array.from({ length: width }, (_, x) => ({
          x, y,
          baseConns: [false, false, false, false], // 上(0), 右(1), 下(2), 左(3)
          rotation: Math.floor(Math.random() * 4),
          type: 'wire',
        }))
      );

      const cx = Math.floor(width / 2);
      const cy = Math.floor(height / 2);
      const stack = [{ x: cx, y: cy }];
      const visited = new Set([`${cx},${cy}`]);

      // 深度优先搜索生成无环网络
      while (stack.length > 0) {
        const curr = stack[stack.length - 1];
        const dirs = [
          { dx: 0, dy: -1, idx: 0, opp: 2 },
          { dx: 1, dy: 0, idx: 1, opp: 3 },
          { dx: 0, dy: 1, idx: 2, opp: 0 },
          { dx: -1, dy: 0, idx: 3, opp: 1 }
        ].sort(() => Math.random() - 0.5);

        let moved = false;
        for (let d of dirs) {
          const nx = curr.x + d.dx;
          const ny = curr.y + d.dy;
          if (nx >= 0 && nx < width && ny >= 0 && ny < height && !visited.has(`${nx},${ny}`)) {
            grid[curr.y][curr.x].baseConns[d.idx] = true;
            grid[ny][nx].baseConns[d.opp] = true;
            visited.add(`${nx},${ny}`);
            stack.push({ x: nx, y: ny });
            moved = true;
            break;
          }
        }
        if (!moved) stack.pop();
      }

      let terminals = 0;
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const cell = grid[y][x];
          const connCount = cell.baseConns.filter(Boolean).length;
          if (x === cx && y === cy) {
            cell.type = 'server';
          } else if (connCount === 1) {
            cell.type = 'terminal';
            terminals++;
          }
        }
      }

      return { grid, terminals };
    }

    // 获取旋转后的实际连接口
    function getCurrentConns(baseConns, rotation) {
      // 将累加的旋转次数标准化为 0-3 之间，处理可能出现的负数或大于3的数
      const r = ((rotation % 4) + 4) % 4;
      return [
        baseConns[(4 - r) % 4],
        baseConns[(5 - r) % 4],
        baseConns[(6 - r) % 4],
        baseConns[(7 - r) % 4]
      ];
    }

    // 检查游戏连通状态
    function checkGameState() {
      if (!gridData || gridData.length === 0) return;

      const cx = Math.floor(currentSize / 2);
      const cy = Math.floor(currentSize / 2);
      
      const queue = [{ x: cx, y: cy }];
      const visited = new Set([`${cx},${cy}`]);
      let activeCount = 0;

      while (queue.length > 0) {
        const { x, y } = queue.shift();
        const tile = gridData[y][x];
        
        if (tile.type === 'terminal') activeCount++;

        const conns = getCurrentConns(tile.baseConns, tile.rotation);
        const neighbors = [
          { dx: 0, dy: -1, opp: 2, hasConn: conns[0] },
          { dx: 1, dy: 0, opp: 3, hasConn: conns[1] },
          { dx: 0, dy: 1, opp: 0, hasConn: conns[2] },
          { dx: -1, dy: 0, opp: 1, hasConn: conns[3] }
        ];

        for (let n of neighbors) {
          if (n.hasConn) {
            const nx = x + n.dx;
            const ny = y + n.dy;
            if (nx >= 0 && nx < currentSize && ny >= 0 && ny < currentSize && !visited.has(`${nx},${ny}`)) {
              const nTile = gridData[ny][nx];
              const nConns = getCurrentConns(nTile.baseConns, nTile.rotation);
              if (nConns[n.opp]) {
                visited.add(`${nx},${ny}`);
                queue.push({ x: nx, y: ny });
              }
            }
          }
        }
      }

      // 更新 UI
      activeCountEl.innerText = activeCount;

      // 判定胜利
      if (visited.size === currentSize * currentSize) {
        isWon = true;
        winOverlay.classList.remove('hidden');
        winText.classList.remove('hidden');
      }
    }

    // 渲染棋盘 HTML
    function renderBoard() {
      boardEl.style.gridTemplateColumns = `repeat(${currentSize}, minmax(0, 1fr))`;
      let html = '';
      
      for (let y = 0; y < currentSize; y++) {
        for (let x = 0; x < currentSize; x++) {
          const tile = gridData[y][x];
          const transformStr = `transform: rotate(${tile.rotation * 90}deg);`;
          
          let linesHtml = '';
          if (tile.baseConns[0]) linesHtml += '<line x1="50" y1="50" x2="50" y2="0" stroke="black" stroke-width="12" stroke-linecap="square" />';
          if (tile.baseConns[1]) linesHtml += '<line x1="50" y1="50" x2="100" y2="50" stroke="black" stroke-width="12" stroke-linecap="square" />';
          if (tile.baseConns[2]) linesHtml += '<line x1="50" y1="50" x2="50" y2="100" stroke="black" stroke-width="12" stroke-linecap="square" />';
          if (tile.baseConns[3]) linesHtml += '<line x1="50" y1="50" x2="0" y2="50" stroke="black" stroke-width="12" stroke-linecap="square" />';
          
          let nodeHtml = '';
          if (tile.type === 'server') nodeHtml = '<rect x="25" y="25" width="50" height="50" fill="black" rx="8" />';
          if (tile.type === 'terminal') nodeHtml = '<rect x="25" y="25" width="50" height="50" fill="#0000ee" />';

          html += `
            <div class="tile w-full h-full bg-white flex items-center justify-center cursor-pointer hover:bg-gray-100 transition-colors" data-x="${x}" data-y="${y}">
              <svg viewBox="0 0 100 100" class="w-full h-full block tile-svg" style="${transformStr}">
                ${linesHtml}
                ${nodeHtml}
              </svg>
            </div>
          `;
        }
      }
      boardEl.innerHTML = html;
    }

    // 处理方块点击逻辑
    function handleTileInteraction(element, direction) {
      if (isWon) return;
      
      // 获取点击的方块坐标
      const x = parseInt(element.dataset.x);
      const y = parseInt(element.dataset.y);
      const tile = gridData[y][x];
      
      // 更新数据层旋转角度 (取消取模，让角度无限累加，保证动画永远沿着正确方向平滑旋转)
      tile.rotation = tile.rotation + direction;
      
      // 仅更新被点击的 SVG 元素的样式，保持极致性能
      const svg = element.querySelector('svg');
      svg.style.transform = `rotate(${tile.rotation * 90}deg)`;
      
      // 检查最新连通状态
      checkGameState();
    }

    // 初始化新游戏
    function startNewGame(newSize) {
      if (newSize) currentSize = parseInt(newSize);
      
      const result = generateBoard(currentSize, currentSize);
      gridData = result.grid;
      totalTerminals = result.terminals;
      isWon = false;
      
      // 重置 UI 状态
      totalCountEl.innerText = totalTerminals;
      winOverlay.classList.add('hidden');
      winText.classList.add('hidden');
      
      renderBoard();
      checkGameState();
    }

    // --- 事件监听绑定 ---

    // 左键点击顺时针旋转
    boardEl.addEventListener('click', (e) => {
      const tileEl = e.target.closest('.tile');
      if (tileEl) handleTileInteraction(tileEl, 1);
    });

    // 右键点击逆时针旋转
    boardEl.addEventListener('contextmenu', (e) => {
      e.preventDefault(); // 阻止浏览器弹出右键菜单
      const tileEl = e.target.closest('.tile');
      if (tileEl) handleTileInteraction(tileEl, -1);
    });

    // 绑定按钮和选择器事件
    newGameBtn.addEventListener('click', () => startNewGame());
    playAgainBtn.addEventListener('click', () => startNewGame());
    sizeSelect.addEventListener('change', (e) => startNewGame(e.target.value));

    // 网页加载完成后启动游戏
    startNewGame(currentSize);
  </script>
</body>
</html>
